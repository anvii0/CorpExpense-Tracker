<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Claim</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <header>
        <h1>Create Expense Claim</h1>
        <div class="actions">
            <a th:href="@{/}" class="btn btn-outline">Back</a>
        </div>
    </header>

    <section class="glass-panel">
        <form th:action="@{/claims}" method="post">
            <div class="form-group">
                <label for="userId">Employee</label>
                <select id="userId" name="userId" required>
                    <option value="">Select employee</option>
                    <option th:each="user : ${users}"
                            th:value="${user.id}"
                            th:text="${user.name} + ' (' + ${user.role} + ')'"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="title">Claim title</label>
                <input id="title" name="title" type="text" required placeholder="April client travel reimbursement">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="3" placeholder="Purpose of the claim"></textarea>
            </div>

            <div class="form-group">
                <label for="paymentMethod">Reimbursement method</label>
                <select id="paymentMethod" name="paymentMethod">
                    <option value="DirectDeposit">Direct Deposit</option>
                    <option value="Cheque">Cheque</option>
                </select>
            </div>

            <button class="btn btn-primary" type="submit">Create Draft</button>
        </form>
    </section>
</div>
</body>
</html>
