<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whoops - Error Encountered</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .error-panel {
            text-align: center;
            max-width: 600px;
            margin: 4rem auto;
            border-color: var(--danger);
        }
        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<div class="container">
    <section class="glass-panel error-panel">
        <div class="error-icon">⚠️</div>
        <h1 style="color: var(--danger); margin-bottom: 1rem;">Action Prohibited</h1>
        <h2 th:text="${status + ' - ' + error}">500 - Internal Server Error</h2>
        
        <p style="margin-bottom: 2rem; color: var(--text-secondary);" 
           th:text="${message}">An unexpected condition was encountered during processing.</p>
           
        <a th:href="@{/}" class="btn btn-primary">Return to Safety (Dashboard)</a>
    </section>
</div>
</body>
</html>
