<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorpExpense - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <header>
            <h1>CorpExpense Tracker</h1>
            <div class="actions">
                <a th:href="@{/submit}" class="btn btn-primary">+ New Claim</a>
                <a th:href="@{/report}" class="btn btn-outline" download>Download CSV Report</a>
            </div>
        </header>

        <section class="glass-panel">
            <h2>Recent Expenses</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Employee</th>
                        <th>Amount (USD Equivalent)</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="exp : ${expenses}">
                        <td th:text="'#' + ${exp.id}">#1</td>
                        <td>
                            <strong th:text="${exp.title}">Travel</strong>
                            <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px;" 
                                 th:text="${exp.paymentMethod} + ' | Receipt: ' + (${exp.receiptImagePath} ?: 'None')"></div>
                        </td>
                        <td th:text="${exp.employee.name}">John Doe</td>
                        <td th:text=" '$' + ${#numbers.formatDecimal(exp.convertedAmountUsd, 1, 2)} + ' (' + ${exp.amount} + ' ' + ${exp.currency} + ')' ">$150.00</td>
                        <td th:text="${exp.submitDate}">2026-04-13</td>
                        <td>
                            <span th:class="'status-badge status-' + ${exp.status}" th:text="${exp.status}">SUBMITTED</span>
                        </td>
                        <td>
                            <div style="display: flex; gap: 8px;">
                                <form th:action="@{/approve/{id}(id=${exp.id})}" method="post" th:if="${exp.status != 'PAID' and exp.status != 'REJECTED'}">
                                    <button type="submit" class="btn btn-sm btn-success">Approve (Chain)</button>
                                </form>
                                <form th:action="@{/reimburse/{id}(id=${exp.id})}" method="post" th:if="${exp.status == 'APPROVED_BY_DIRECTOR' or exp.status == 'APPROVED_BY_FINANCE' or exp.status == 'APPROVED_BY_MANAGER'}">
                                    <button type="submit" class="btn btn-sm btn-primary">Pay (Strategy)</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(expenses)}">
                        <td colspan="7" style="text-align: center; color: var(--text-secondary);">No expenses submitted yet.</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>
</body>
</html>
