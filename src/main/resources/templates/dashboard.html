<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorpExpense Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container wide">
    <header>
        <div>
            <h1>CorpExpense Tracker</h1>
            <p class="subtle">Multi-tier expense claim workflow with receipt validation, budget checks, audit trail, and export reports.</p>
        </div>
        <div class="actions">
            <a th:href="@{/claims/new}" class="btn btn-primary">Create Claim</a>
            <a th:href="@{/reports}" class="btn btn-outline">Reports</a>
            <a th:href="@{/h2-console}" class="btn btn-outline">H2 Console</a>
        </div>
    </header>

    <section class="flash" th:if="${message}" th:text="${message}"></section>

    <section class="grid-two">
        <div class="glass-panel">
            <h2>Claims</h2>
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Employee</th>
                    <th>Total USD</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="claim : ${claims}">
                    <td th:text="'#' + ${claim.id}"></td>
                    <td>
                        <strong th:text="${claim.title}"></strong>
                        <div class="table-note" th:text="${claim.entries.size()} + ' entries | ' + ${claim.paymentMethod}"></div>
                    </td>
                    <td th:text="${claim.employee != null ? claim.employee.name : 'NA'}"></td>
                    <td th:text="'$' + ${#numbers.formatDecimal(claim.convertedAmountUsd, 1, 2)}"></td>
                    <td><span th:class="'status-badge status-' + ${claim.status}" th:text="${claim.status}"></span></td>
                    <td><a th:href="@{/claims/{id}(id=${claim.id})}" class="btn btn-sm btn-outline">Open</a></td>
                </tr>
                <tr th:if="${#lists.isEmpty(claims)}">
                    <td colspan="6">No claims yet.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="stack">
            <div class="glass-panel">
                <h2>Department Budgets</h2>
                <div class="budget-card" th:each="budget : ${budgets}">
                    <div class="budget-row">
                        <strong th:text="${budget.departmentName}"></strong>
                        <span th:text="'Spent $' + ${#numbers.formatDecimal(budget.currentlySpent, 1, 2)} + ' / $' + ${#numbers.formatDecimal(budget.totalAllocated, 1, 2)}"></span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" th:style="'width:' + ${(budget.currentlySpent / budget.totalAllocated) * 100} + '%'"></div>
                    </div>
                    <div class="table-note" th:text="'Remaining $' + ${#numbers.formatDecimal(budget.remainingBudget, 1, 2)}"></div>
                </div>
            </div>

            <div class="glass-panel">
                <h2>Recent Audit Trail</h2>
                <div class="audit-item" th:each="log : ${logs}">
                    <strong th:text="${log.action}"></strong>
                    <div class="table-note" th:text="${log.userName} + ' | Claim #' + ${log.claimId}"></div>
                    <div class="table-note" th:text="${log.details}"></div>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
