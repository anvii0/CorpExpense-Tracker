<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Detail</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container wide">
    <header>
        <div>
            <h1 th:text="${claim.title}">Claim</h1>
            <p class="subtle" th:text="${claim.description}"></p>
        </div>
        <div class="actions">
            <a th:href="@{/}" class="btn btn-outline">Dashboard</a>
            <span th:class="'status-badge status-' + ${claim.status}" th:text="${claim.status}"></span>
        </div>
    </header>

    <section class="flash" th:if="${message}" th:text="${message}"></section>

    <section class="grid-two">
        <div class="glass-panel">
            <h2>Add Expense Entry</h2>
            <form th:action="@{/claims/{id}/entries(id=${claim.id})}" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category">
                        <option th:each="category : ${categories}" th:value="${category}" th:text="${category}"></option>
                    </select>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input id="amount" name="amount" type="number" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="currency">Currency</label>
                        <select id="currency" name="currency">
                            <option>USD</option>
                            <option>EUR</option>
                            <option>GBP</option>
                            <option>INR</option>
                            <option>JPY</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="description">Entry description</label>
                    <input id="description" name="description" type="text" placeholder="Flight ticket / hotel invoice / team lunch">
                </div>
                <div class="form-group">
                    <label for="receipt">Receipt upload</label>
                    <input id="receipt" name="receipt" type="file" accept="image/*,.pdf">
                </div>
                <button type="submit" class="btn btn-primary">Add Entry</button>
            </form>
        </div>

        <div class="glass-panel">
            <h2>Claim Summary</h2>
            <div class="summary-list">
                <div><strong>Employee:</strong> <span th:text="${claim.employee.name}"></span></div>
                <div><strong>Department:</strong> <span th:text="${claim.employee.department}"></span></div>
                <div><strong>Total USD:</strong> <span th:text="'$' + ${#numbers.formatDecimal(claim.convertedAmountUsd, 1, 2)}"></span></div>
                <div><strong>Entries:</strong> <span th:text="${claim.entries.size()}"></span></div>
            </div>

            <div class="actions top-gap">
                <form th:if="${claim.status.name() == 'DRAFT'}" th:action="@{/claims/{id}/submit(id=${claim.id})}" method="post">
                    <button class="btn btn-success" type="submit">Submit Claim</button>
                </form>
                <form th:if="${claim.status.name().startsWith('PENDING')}" th:action="@{/claims/{id}/approve(id=${claim.id})}" method="post">
                    <button class="btn btn-primary" type="submit">Approve Next Step</button>
                </form>
                <form th:if="${claim.status.name().startsWith('PENDING')}" th:action="@{/claims/{id}/reject(id=${claim.id})}" method="post">
                    <button class="btn btn-danger" type="submit">Reject</button>
                </form>
                <form th:if="${claim.status.name() == 'FULLY_APPROVED'}" th:action="@{/claims/{id}/reimburse(id=${claim.id})}" method="post">
                    <button class="btn btn-success" type="submit">Disburse and Update Budget</button>
                </form>
            </div>
        </div>
    </section>

    <section class="glass-panel top-gap">
        <h2>Entries</h2>
        <table>
            <thead>
            <tr>
                <th>Category</th>
                <th>Original Amount</th>
                <th>USD</th>
                <th>Receipt</th>
                <th>Policy</th>
                <th>OCR Result</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="entry : ${claim.entries}">
                <td th:text="${entry.category}"></td>
                <td th:text="${entry.amount} + ' ' + ${entry.currency}"></td>
                <td th:text="'$' + ${#numbers.formatDecimal(entry.convertedAmountUsd, 1, 2)}"></td>
                <td th:text="${entry.receiptImagePath != null ? entry.receiptImagePath : 'Manual'}"></td>
                <td>
                    <span th:class="${entry.policyCompliant} ? 'pill-ok' : 'pill-bad'"
                          th:text="${entry.policyCompliant} ? 'Compliant' : 'Violation'"></span>
                </td>
                <td th:text="${entry.receiptVerified} ? 'Verified' : (entry.manualReviewRequired ? 'Manual review' : 'Pending')"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(claim.entries)}">
                <td colspan="6">No entries added yet.</td>
            </tr>
            </tbody>
        </table>
    </section>
</div>
</body>
</html>
